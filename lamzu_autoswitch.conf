# LAMZU INCA AutoSwitch configuration
# Updates made from the tray GUI are written back immediately.

interval_seconds=6

default_mode=office
default_poll=1000
default_motion_sync=on
default_sleep_seconds=30

hit_mode=20000fps
hit_poll=4000
hit_motion_sync=off
hit_sleep_seconds=600

# whitelist process names, one per line
cs2.exe
kook.exe
